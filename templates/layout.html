
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CiteSpace-Lite 学术分析</title>
<link href="https://cdn.bootcdn.net/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.4.3/echarts.min.js"></script>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts-wordcloud/2.1.0/echarts-wordcloud.min.js"></script>
<style>
  :root {
    --cs-dark: #1a1d23;
    --cs-blue: #2d5096;
    --cs-light: #e3e7ed;
    --cs-accent: #4a90e2;
  }
  body {
    background: var(--cs-dark);
    color: var(--cs-light);
    font-family: "Microsoft YaHei", sans-serif;
    padding-bottom:40px;
  }
  .cs-navbar {
    background: #252a33;
    border-bottom: 2px solid var(--cs-blue);
  }
  .cs-card {
    background: #2a2f3a;
    border: 1px solid #3c424e;
    border-radius: 8px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .cs-title {
    color: var(--cs-accent);
    font-weight: bold;
    margin-bottom: 16px;
  }
  .nav-link { color: #e3e7ed; }
  .nav-link:hover { color: #4a90e2; }
</style>
</head>
<body>

<nav class="navbar navbar-expand cs-navbar px-3">
  <div class="container-fluid">
    <a class="navbar-brand text-white" href="/">📊 CiteSpace-Lite</a>
    <div class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/">首页</a></li>
        <li class="nav-item"><a class="nav-link" href="/metrics">指标分析</a></li>
        <li class="nav-item"><a class="nav-link" href="/network">知识网络</a></li>

        <li class="nav-item"><a href="/lda" class="nav-link">LDA主题聚类</a></li>
        <li class="nav-item"><a class="nav-link" href="/timeline">时序演进</a></li>
        <li class="nav-item"><a class="nav-link" href="/statistics">统计分析</a></li>
        <li class="nav-item"><a class="nav-link" href="/list">文献列表</a></li>
        <li class="nav-item"><a href="/logout" class="nav-link">退出登录</a></li>
      </ul>
    </div>
  </div>
</nav>

<div class="container mt-4">
  {% block content %}{% endblock %}
</div>

</body>
</html>
