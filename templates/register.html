<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>注册</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft YaHei}
        body{background:#1a202c;display:flex;justify-content:center;align-items:center;height:100vh}
        .box{background:#2d3748;padding:40px;border-radius:12px;width:400px}
        .box h2{color:#63b3ed;text-align:center;margin-bottom:24px}
        .item{margin-bottom:16px}
        .item label{display:block;color:#fff;margin-bottom:6px}
        .item input{width:100%;padding:12px;background:#1a202c;border:1px solid #4a5568;border-radius:6px;color:#fff}
        .btn{width:100%;padding:12px;background:#2b6cb0;color:#fff;border:none;border-radius:6px;margin-top:10px;cursor:pointer}
        .btn:hover{background:#2c5282}
        .msg{color:#e53e3e;text-align:center;margin-top:12px}
        .tip{color:#aaa;font-size:12px;margin-top:4px}
        .link{text-align:center;margin-top:16px;color:#ccc}
        .link a{color:#63b3ed}
    </style>
</head>
<body>
<div class="box">
    <h2>账号注册</h2>
    <form method="post">
        <div class="item">
            <label>账号</label>
            <input name="username" required>
            <div class="tip">4-20位，字母/数字/下划线</div>
        </div>
        <div class="item">
            <label>密码</label>
            <input type="password" name="password" required>
            <div class="tip">6-20位</div>
        </div>
        <button class="btn">注册</button>
    </form>
    {% if msg %}
    <div class="msg">{{ msg }}</div>
    {% endif %}
    <div class="link">已有账号？<a href="/login">去登录</a></div>
</div>
</body>
</html>
